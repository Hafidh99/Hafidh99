name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main 

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: anmol0013/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TOTAL_CODE_TIME: "true"
          SHOW_LANGUAGES: "true"
          SHOW_PROJECTS: "true"    
          SHOW_OS: "true"              
          SHOW_EDITORS: "false"        
          SHOW_DAYS_OF_WEEK: "true"    
          SHOW_SHORT_INFO: "true"
          SHOW_LOC_CHART: "false"
          LANG_LIMIT: 5
